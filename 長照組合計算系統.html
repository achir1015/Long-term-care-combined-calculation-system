<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長照組合計算系統</title>
<style>
:root{
  --primary:#0b6e4f;--primary-light:#e1f5ee;--primary-mid:#1d9e75;
  --accent:#d85a30;--warning:#ba7517;--warning-light:#faeeda;
  --danger:#a32d2d;--danger-light:#fcebeb;
  --success:#3b6d11;--success-light:#eaf3de;
  --gray:#5f5e5a;--gray-light:#f1efe8;
  --border:#d3d1c7;--text:#2c2c2a;--text-muted:#888780;
  --bg:#f5f4f0;--white:#ffffff;--shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC','微軟正黑體','蘋方-繁',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:18px;line-height:1.6;}

/* ===== 頁首 ===== */
.page-header{background:var(--primary);color:#fff;padding:13px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,.2);position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.page-header h1{font-size:21px;font-weight:600;flex:1;}
.page-header .version{font-size:13px;opacity:.7;margin-left:4px;}
.btn-hdr{padding:7px 16px;border-radius:7px;font-size:15px;font-family:inherit;cursor:pointer;font-weight:600;border:1.5px solid rgba(255,255,255,.6);background:rgba(255,255,255,.15);color:#fff;}
.btn-hdr:hover{background:rgba(255,255,255,.28);}
.btn-hdr.manage{background:rgba(255,200,50,.2);border-color:rgba(255,200,50,.8);}
.btn-hdr.manage:hover{background:rgba(255,200,50,.35);}

.container{max-width:1000px;margin:0 auto;padding:16px 14px 90px;}

/* ===== Card ===== */
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;}
.card-header{padding:11px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
.card-header h2{font-size:18px;font-weight:600;flex:1;}
.badge{font-size:14px;padding:3px 10px;border-radius:20px;font-weight:500;}
.badge-gov{background:var(--success-light);color:var(--success);}
.badge-used{background:var(--primary-light);color:var(--primary);}
.card-header .toggle{font-size:20px;color:var(--gray);transition:transform .2s;}
.card-header.open .toggle{transform:rotate(180deg);}
.card-body{padding:14px 16px;}

/* ===== 案主條件 ===== */
.conditions-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;}
.field label{display:block;font-size:15px;color:var(--text-muted);margin-bottom:4px;font-weight:600;}
.field input,.field select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:6px;font-size:17px;font-family:inherit;color:var(--text);background:var(--white);outline:none;}
.field input:focus,.field select:focus{border-color:var(--primary-mid);box-shadow:0 0 0 2px rgba(29,158,117,.15);}
.field .hint{font-size:13px;color:var(--text-muted);margin-top:3px;}
.quota-row{display:flex;gap:6px;}
.quota-row input{flex:1;}
.quota-row button{padding:8px 11px;background:var(--gray-light);border:1px solid var(--border);border-radius:6px;font-size:15px;cursor:pointer;color:var(--text);}
.quota-row button:hover{background:var(--border);}

/* ===== 警示 ===== */
#alerts-box{display:none;}
.alert{display:flex;gap:10px;padding:11px 14px;border-radius:8px;margin-bottom:8px;font-size:16px;align-items:flex-start;}
.alert-danger{background:var(--danger-light);color:var(--danger);border:1px solid #f09595;}
.alert-warning{background:var(--warning-light);color:var(--warning);border:1px solid #fac775;}
.alert-info{background:var(--primary-light);color:var(--primary);border:1px solid #9fe1cb;}
.alert-icon{font-size:18px;flex-shrink:0;}

/* ===== 服務表格 ===== */
.svc-table{width:100%;border-collapse:collapse;}
.svc-table th{background:var(--gray-light);padding:8px 11px;text-align:left;font-size:15px;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;}
.svc-table th.right{text-align:right;}
.svc-table td{padding:8px 11px;border-bottom:1px solid var(--gray-light);font-size:16px;vertical-align:middle;}
.svc-table tr:last-child td{border-bottom:none;}
.svc-table tr.active-row{background:var(--primary-light);}
.svc-table tr.conflict-row{background:var(--danger-light);}
.svc-code{font-family:monospace;font-size:15px;background:var(--gray-light);padding:2px 7px;border-radius:4px;color:var(--gray);font-weight:600;}
.svc-name{font-weight:500;}
.svc-note{font-size:13px;color:var(--text-muted);margin-top:2px;}
.svc-note.warn{color:var(--warning);}
.svc-note.gov{color:var(--success);font-weight:600;}
.svc-price{text-align:right;font-variant-numeric:tabular-nums;color:var(--text-muted);}
.copay-zero{color:var(--success);font-weight:600;}
.qty-input{width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;text-align:center;font-size:17px;font-family:inherit;color:var(--text);}
.qty-input:focus{border-color:var(--primary-mid);outline:none;}
.qty-input.conflict{border-color:var(--danger);background:var(--danger-light);}
.qty-input[disabled]{background:var(--gray-light);color:var(--text-muted);cursor:not-allowed;}
.td-right{text-align:right;}

/* ===== 底部摘要 ===== */
#summary-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:2px solid var(--primary);padding:10px 20px;display:flex;gap:16px;align-items:center;justify-content:center;box-shadow:0 -2px 10px rgba(0,0,0,.1);z-index:50;flex-wrap:wrap;}
.sum-item{text-align:center;}
.sum-label{font-size:14px;color:var(--text-muted);}
.sum-val{font-size:23px;font-weight:600;font-variant-numeric:tabular-nums;}
.sum-val.primary{color:var(--primary);}
.sum-val.accent{color:var(--accent);}
.sum-divider{width:1px;height:38px;background:var(--border);}
.quota-bar-wrap{flex:1;min-width:180px;max-width:300px;}
.quota-label{font-size:14px;color:var(--text-muted);margin-bottom:3px;}
.quota-bar{height:9px;background:var(--gray-light);border-radius:5px;overflow:hidden;}
.quota-fill{height:100%;border-radius:5px;transition:width .3s;background:var(--primary-mid);}
.quota-fill.over{background:var(--danger);}
.quota-pct{font-size:13px;font-weight:600;margin-top:2px;}

/* ===== 正式列印表格 ===== */
.print-table-card{display:none;}
.print-table-card.show{display:block;}
.formal-table{width:100%;border-collapse:collapse;font-size:17px;}
.formal-table th{background:#e0e0e0;border:1.5px solid #999;padding:9px 13px;text-align:center;font-weight:700;font-size:16px;}
.formal-table td{border:1px solid #bbb;padding:8px 13px;vertical-align:middle;}
.formal-table td.num{text-align:right;font-variant-numeric:tabular-nums;}
.formal-table td.center{text-align:center;}
.formal-table tr.aa-row td{background:#eaf3de;}
.formal-table tr.subtotal-row td{background:#f5e9c8;font-weight:700;font-size:17px;}
.formal-table tr.total-row td{background:#e0e0e0;font-weight:700;font-size:18px;}
.print-actions{display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--border);justify-content:flex-end;}
.btn-print{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;background:var(--primary);color:#fff;border:none;border-radius:7px;font-size:16px;cursor:pointer;font-family:inherit;font-weight:600;}
.btn-print:hover{background:var(--primary-mid);}
.print-note{font-size:14px;color:var(--text-muted);padding:6px 16px 14px;line-height:1.8;}

/* ===================================================
   管理面板 Modal
   ================================================= */
.mgr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;overflow:auto;}
.mgr-overlay.show{display:flex;flex-direction:column;}
.mgr-panel{background:#fff;margin:auto;width:min(960px,98vw);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;max-height:92vh;}

/* 管理面板頁首 */
.mgr-header{background:var(--primary);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.mgr-header h2{font-size:18px;font-weight:600;flex:1;}
.mgr-toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--gray-light);flex-shrink:0;}
.btn-mgr{padding:7px 14px;border-radius:6px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:600;border:1px solid var(--border);background:#fff;color:var(--text);}
.btn-mgr:hover{background:var(--gray-light);}
.btn-mgr.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-mgr.primary:hover{background:var(--primary-mid);}
.btn-mgr.danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.btn-mgr.danger:hover{background:#c02020;}

/* 管理面板過濾列 */
.mgr-filters{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;align-items:center;}
.mgr-filters input{padding:7px 11px;border:1px solid var(--border);border-radius:6px;font-size:15px;font-family:inherit;width:200px;outline:none;}
.mgr-filters input:focus{border-color:var(--primary-mid);}
.cat-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.cat-tab{padding:5px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text-muted);font-family:inherit;}
.cat-tab:hover{background:var(--gray-light);}
.cat-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* 管理表格 */
.mgr-body{overflow-y:auto;flex:1;}
.mgr-table{width:100%;border-collapse:collapse;font-size:15px;}
.mgr-table th{position:sticky;top:0;background:#eee;border-bottom:2px solid var(--border);padding:8px 12px;text-align:left;font-weight:600;color:var(--text-muted);font-size:13px;z-index:1;}
.mgr-table td{padding:8px 12px;border-bottom:1px solid var(--gray-light);vertical-align:middle;}
.mgr-table tr:hover td{background:#f8f8f8;}
.mgr-table td.price-cell{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
.mgr-table td.code-cell{font-family:monospace;font-weight:700;color:var(--primary);}
.mgr-table td.actions{white-space:nowrap;}
.btn-edit{padding:4px 12px;border-radius:5px;font-size:13px;cursor:pointer;border:1px solid var(--primary-mid);background:var(--primary-light);color:var(--primary);font-family:inherit;}
.btn-edit:hover{background:var(--primary);color:#fff;}
.btn-del{padding:4px 12px;border-radius:5px;font-size:13px;cursor:pointer;border:1px solid #f09595;background:var(--danger-light);color:var(--danger);font-family:inherit;margin-left:5px;}
.btn-del:hover{background:var(--danger);color:#fff;}
.flag-badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:10px;margin:1px;font-weight:600;}
.flag-gov{background:var(--success-light);color:var(--success);}
.flag-pub{background:var(--warning-light);color:var(--warning);}
.flag-resp{background:var(--primary-light);color:var(--primary);}
.mgr-empty{padding:40px;text-align:center;color:var(--text-muted);font-size:16px;}

/* ===================================================
   新增/編輯 Form Modal
   ================================================= */
.form-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;overflow:auto;align-items:center;justify-content:center;}
.form-overlay.show{display:flex;}
.form-modal{background:#fff;border-radius:12px;width:min(620px,96vw);max-height:90vh;overflow-y:auto;}
.form-modal-header{background:var(--primary);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:10px;border-radius:12px 12px 0 0;}
.form-modal-header h3{font-size:17px;font-weight:600;flex:1;}
.form-body{padding:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-field{display:flex;flex-direction:column;gap:4px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:14px;color:var(--text-muted);font-weight:600;}
.form-field input,.form-field select,.form-field textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:15px;font-family:inherit;color:var(--text);outline:none;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--primary-mid);}
.form-field .field-hint{font-size:12px;color:var(--text-muted);}
.form-actions{display:flex;gap:10px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border);}
.btn-save{padding:9px 24px;background:var(--primary);color:#fff;border:none;border-radius:7px;font-size:16px;cursor:pointer;font-family:inherit;font-weight:600;}
.btn-save:hover{background:var(--primary-mid);}
.btn-cancel{padding:9px 20px;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:7px;font-size:16px;cursor:pointer;font-family:inherit;}
.btn-cancel:hover{background:var(--gray-light);}

/* ===== 列印 ===== */
@media print{
  #summary-bar,.page-header,#alerts-box,.card:not(#print-card){display:none!important;}
  #print-card{display:block!important;border:none;box-shadow:none;}
  .print-actions{display:none;}
  body{font-size:15px;background:#fff;}
  .formal-table{font-size:14px;}
}
</style>
</head>
<body>

<!-- ===== 頁首 ===== -->
<header class="page-header">
  <span style="font-size:24px">🏥</span>
  <h1>台灣長照組合計算系統<span class="version">v2.0</span></h1>
  <button class="btn-hdr manage" onclick="openManager()">⚙ 管理服務項目</button>
  <button class="btn-hdr" onclick="resetAll()">⟳ 歸零計算</button>
</header>

<div class="container">

  <!-- 案主條件 -->
  <div class="card">
    <div class="card-header open" onclick="toggleCard(this)">
      <span style="font-size:18px">👤</span><h2>案主條件</h2><span class="toggle">▾</span>
    </div>
    <div class="card-body">
      <div class="conditions-grid">
        <div class="field"><label>身分別</label>
          <select id="incomeType" onchange="recalc()">
            <option value="一般戶">一般戶（16%）</option>
            <option value="中低收入戶">中低收入戶（5%）</option>
            <option value="低收入戶">低收入戶（免負擔）</option>
          </select></div>
        <div class="field"><label>失能等級</label>
          <select id="disabilityLevel" onchange="onLevelChange()">
            <option value="2">第 2 級</option><option value="3">第 3 級</option>
            <option value="4">第 4 級</option><option value="5" selected>第 5 級</option>
            <option value="6">第 6 級</option><option value="7">第 7 級</option>
            <option value="8">第 8 級</option>
          </select></div>
        <div class="field"><label>案主年齡</label>
          <input type="number" id="clientAge" value="80" min="0" max="120" onchange="recalc()">
          <div class="hint">AA05 需 50 歲以上</div></div>
        <div class="field"><label>確診失智症</label>
          <select id="hasDementia" onchange="recalc()">
            <option value="0">否</option><option value="1">是</option>
          </select><div class="hint">AA05 加計資格</div></div>
        <div class="field"><label>家庭照顧者年齡</label>
          <input type="number" id="caregiverAge" value="70" min="0" max="120" onchange="recalc()">
          <div class="hint">AA07 需超過 75 歲</div></div>
        <div class="field"><label>BC項月額度（元）</label>
          <div class="quota-row">
            <input type="number" id="monthlyQuota" value="23400" min="0" step="100" onchange="recalc()">
            <button onclick="autoFillQuota()">自動</button>
          </div><div class="hint" id="quotaHint">依失能等級自動建議</div></div>
        <div class="field"><label>案主姓名（列印用）</label>
          <input type="text" id="clientName" placeholder="（選填）" onchange="recalc()">
          <div class="hint">顯示於正式表格</div></div>
      </div>
    </div>
  </div>

  <div id="alerts-box"></div>

  <!-- 動態服務卡片 -->
  <div id="service-cards"></div>

  <!-- 正式列印表格 -->
  <div class="card print-table-card" id="print-card">
    <div class="card-header open" onclick="toggleCard(this)">
      <span style="font-size:18px">📋</span><h2>照顧組合計算表（正式列印）</h2><span class="toggle">▾</span>
    </div>
    <div class="card-body" style="padding:14px 16px 0">
      <div id="print-table-wrap"></div>
      <div class="print-note" id="print-note-text"></div>
    </div>
    <div class="print-actions">
      <button class="btn-print" onclick="window.print()">🖨️ 列印 / 存 PDF</button>
    </div>
  </div>
</div>

<!-- ===== 底部摘要 ===== -->
<div id="summary-bar">
  <div class="sum-item"><div class="sum-label">已選服務補助總額</div><div class="sum-val primary" id="bar-total">$0</div></div>
  <div class="sum-divider"></div>
  <div class="sum-item"><div class="sum-label">個人自付合計</div><div class="sum-val accent" id="bar-copay">$0</div></div>
  <div class="sum-divider"></div>
  <div class="quota-bar-wrap">
    <div class="quota-label">BC項額度 <span id="bar-quota-used">0</span> / <span id="bar-quota-total">0</span> 元</div>
    <div class="quota-bar"><div class="quota-fill" id="quota-fill" style="width:0%"></div></div>
    <div class="quota-pct" id="bar-quota-pct" style="color:var(--text-muted)">0%</div>
  </div>
  <div class="sum-divider"></div>
  <div class="sum-item"><div class="sum-label">AA加計（政府全補）</div><div class="sum-val" style="color:var(--success);font-size:20px" id="bar-aa">$0</div></div>
</div>

<!-- ===================================================
     管理面板 Overlay
     ================================================= -->
<div class="mgr-overlay" id="mgr-overlay" onclick="closeMgrIfBg(event)">
  <div class="mgr-panel" onclick="event.stopPropagation()">
    <div class="mgr-header">
      <span style="font-size:20px">⚙</span>
      <h2>服務項目管理</h2>
      <button class="btn-hdr" onclick="closeManager()" style="font-size:20px;padding:4px 10px">✕</button>
    </div>
    <div class="mgr-toolbar">
      <button class="btn-mgr primary" onclick="openForm(null)">＋ 新增服務項目</button>
      <button class="btn-mgr" onclick="exportJSON()">⬇ 匯出 JSON</button>
      <label class="btn-mgr" style="cursor:pointer">⬆ 匯入 JSON<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
      <button class="btn-mgr danger" onclick="resetToDefault()">↺ 還原預設資料</button>
      <span style="margin-left:auto;font-size:13px;color:var(--text-muted);align-self:center" id="mgr-count"></span>
    </div>
    <div class="mgr-filters">
      <div class="cat-tabs" id="cat-tabs"></div>
      <input type="text" id="mgr-search" placeholder="🔍 搜尋代碼或名稱…" oninput="renderMgrTable()">
    </div>
    <div class="mgr-body">
      <table class="mgr-table">
        <thead><tr>
          <th>代碼</th><th>類別</th><th>服務項目名稱</th>
          <th style="text-align:right">單價</th><th>特殊標記</th><th>操作</th>
        </tr></thead>
        <tbody id="mgr-tbody"></tbody>
      </table>
      <div id="mgr-empty" class="mgr-empty" style="display:none">沒有符合條件的服務項目</div>
    </div>
  </div>
</div>

<!-- ===================================================
     新增/編輯 Form Modal
     ================================================= -->
<div class="form-overlay" id="form-overlay" onclick="closeFormIfBg(event)">
  <div class="form-modal" onclick="event.stopPropagation()">
    <div class="form-modal-header">
      <span style="font-size:18px">📝</span>
      <h3 id="form-title">新增服務項目</h3>
      <button class="btn-hdr" onclick="closeForm()" style="font-size:20px;padding:4px 10px">✕</button>
    </div>
    <div class="form-body">
      <div class="form-grid">
        <div class="form-field">
          <label>服務代碼 *</label>
          <input type="text" id="f-code" placeholder="例：BA01" maxlength="20">
          <div class="field-hint">修改代碼將視為新增（原代碼仍保留）</div>
        </div>
        <div class="form-field">
          <label>類別 *</label>
          <select id="f-cat">
            <option value="AA">AA 加計</option>
            <option value="BA">BA 居家照顧</option>
            <option value="BB">BB 日間照顧</option>
            <option value="BC">BC 家庭托顧</option>
            <option value="BD">BD 社區式服務</option>
            <option value="C">CA/CB/CD 專業服務</option>
            <option value="DA">DA 交通接送</option>
            <option value="GA">GA 喘息服務</option>
          </select>
        </div>
        <div class="form-field full">
          <label>服務名稱 *</label>
          <input type="text" id="f-name" placeholder="例：基本身體清潔">
        </div>
        <div class="form-field">
          <label>給(支)付單價（元）*</label>

// ===================================================
// 儲存 Key
// ===================================================
const STORAGE_KEY = 'ltc_services_v2';

// ===================================================
// 從 localStorage 載入，fallback 到預設
// ===================================================
function loadServicesData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { const d=JSON.parse(s); if(Array.isArray(d)&&d.length) return d; }
  } catch(e) {}
  return DEFAULT_SERVICES_DATA.map(s=>({...s}));
}

// 儲存到 localStorage
function saveServicesData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(SERVICES_DATA));
}

// eligibleType 字串 → 函式
function buildEligible(type) {
  if (type==='aa05') return c=>c.age>=50&&c.hasDementia;
  if (type==='aa07') return c=>c.disabilityLevel>=4&&c.caregiverAge>75;
  return null;
}

// 純資料陣列 → 加上 eligible 函式的執行陣列
function buildServices(data) {
  return data.map(d=>({
    ...d,
    eligible: buildEligible(d.eligibleType),
    conflicts: Array.isArray(d.conflicts) ? d.conflicts : [],
  }));
}

  const rate=INCOME_RATE[incomeType]||0;
  if (svc.special==='public50') {
    const half=svc.price/2;
    return Math.floor(half)+Math.floor(half*rate);
  }
  return Math.floor(svc.price*rate);
}

function getConditions() {
  return {
    incomeType:      document.getElementById('incomeType').value,
    disabilityLevel: parseInt(document.getElementById('disabilityLevel').value),
    age:             parseInt(document.getElementById('clientAge').value)||0,
    hasDementia:     document.getElementById('hasDementia').value==='1',

}

function buildRow(svc, c) {
  const qty   = qtyMap[svc.code]||0;
  const cU    = calcCopayPerUnit(svc,c.incomeType);
  const totC  = cU*qty, totQ=svc.price*qty;
  const hasConflict=(svc.conflicts||[]).some(x=>(qtyMap[x]||0)>0);
  const inelig=svc.eligible&&!svc.eligible(c);
  const trCls = qty>0?(hasConflict?'conflict-row':'active-row'):'';
  const dis   = inelig?'disabled':'';
  const qCls  = hasConflict?'qty-input conflict':'qty-input';
  const maxA  = svc.maxUnits>0?`max="${svc.maxUnits}"`:'';
  const copD  = svc.govFull?`<span class="copay-zero">$0 ★</span>`:`$${cU.toLocaleString()}`;
  const subD  = svc.govFull?`<span class="copay-zero">$0</span>`:(qty>0?`<strong>$${totC.toLocaleString()}</strong>`:`$${totC.toLocaleString()}`);
  let note='';
  if (inelig&&svc.note) note+=`<div class="svc-note warn">⚠ 資格不符：${svc.note}</div>`;
  else if (svc.note)    note+=`<div class="svc-note ${svc.govFull?'gov':''}">${svc.govFull?'★ ':''}${svc.note}</div>`;
  if (hasConflict&&svc.conflictNote) note+=`<div class="svc-note warn">⛔ ${svc.conflictNote}</div>`;
  const inp=`<input class="${qCls}" type="number" min="0" ${maxA} value="${qty}" ${dis} id="qty-${svc.code}" onchange="onQtyChange('${svc.code}',this.value)">`;
  if (svc.cat==='AA') {
    const subQ=qty>0?`<span style="color:var(--success)">$${totQ.toLocaleString()}</span>`:'$0';
    return `<tr class="${trCls}"><td><span class="svc-code">${svc.code}</span></td><td><div class="svc-name">${svc.name}</div>${note}</td><td class="svc-price">$${svc.price}</td><td class="td-right">${inp}</td><td class="td-right">${subQ}</td><td class="td-right">${subD}</td></tr>`;
  }
  return `<tr class="${trCls}"><td><span class="svc-code">${svc.code}</span></td><td><div class="svc-name">${svc.name}</div>${note}</td><td class="svc-price">$${svc.price}</td><td class="td-right">${inp}</td><td style="text-align:right">${copD}</td><td class="td-right">${subD}</td></tr>`;
}

function renderTables() {
  const c=getConditions();
  Object.keys(CAT_META).forEach(cat=>{
    const tb=document.getElementById('tbody-'+cat);
    if(tb) tb.innerHTML=SERVICES.filter(s=>s.cat===cat).map(s=>buildRow(s,c)).join('');
  });
}

function updateSummaryBar(c) {
  let totS=0,totCp=0,aaS=0,bcU=0;
  SERVICES.forEach(s=>{
    const qty=qtyMap[s.code]||0; if(!qty) return;
    const cu=calcCopayPerUnit(s,c.incomeType),lQ=s.price*qty,lCp=cu*qty;
    if(s.govFull){aaS+=lQ;}else{totCp+=lCp;totS+=lQ;if(!s.useRespiteQuota)bcU+=lQ;}
  });
  document.getElementById('bar-total').textContent='$'+totS.toLocaleString();
  document.getElementById('bar-copay').textContent='$'+totCp.toLocaleString();
  document.getElementById('bar-aa').textContent='$'+aaS.toLocaleString();
  document.getElementById('bar-quota-used').textContent=bcU.toLocaleString();
  document.getElementById('bar-quota-total').textContent=c.quota.toLocaleString();
  const pct=c.quota>0?Math.round(bcU/c.quota*100):0;
  const fill=document.getElementById('quota-fill');
  fill.style.width=Math.min(pct,100)+'%';
  const pEl=document.getElementById('bar-quota-pct');
  if(pct>100){fill.className='quota-fill over';pEl.style.color='var(--danger)';pEl.textContent=`⚠ ${pct}% 超出額度`;}
  else{fill.className='quota-fill';pEl.style.color=pct>=90?'var(--warning)':'var(--text-muted)';pEl.textContent=`${pct}%`;}
}

function checkAlerts(c) {
  const box=document.getElementById('alerts-box'),msgs=[];
  if((qtyMap['BA04']||0)>0&&(qtyMap['BA05']||0)>0)msgs.push({t:'danger',m:'⛔ BA04（協助進食或管灌餵食）已含食物加熱，<strong>不得與 BA05（餐食照顧）同時申請</strong>，請擇一。'});
  if((qtyMap['AA05']||0)>0){if(!c.hasDementia)msgs.push({t:'warning',m:'⚠ AA05：需「經確診之失智症患者」，請確認是否已設定。'});if(c.age<50)msgs.push({t:'warning',m:`⚠ AA05：需 50 歲以上，目前 ${c.age} 歲。`});}
  if((qtyMap['AA07']||0)>0){if(c.disabilityLevel<4)msgs.push({t:'warning',m:`⚠ AA07：需失能 4 級以上，目前第 ${c.disabilityLevel} 級。`});if(c.caregiverAge<=75)msgs.push({t:'warning',m:`⚠ AA07：需家庭照顧者超過 75 歲，目前 ${c.caregiverAge} 歲。`});if((qtyMap['AA07']||0)>1)msgs.push({t:'danger',m:'⛔ AA07 每月僅可申請 <strong>1 次</strong>。'});}
  const bcU=SERVICES.filter(s=>!s.govFull&&!s.useRespiteQuota).reduce((a,s)=>a+s.price*(qtyMap[s.code]||0),0);
  if(bcU>c.quota&&c.quota>0)msgs.push({t:'danger',m:`⛔ BC項額度超支：已用 $${bcU.toLocaleString()}，月額 $${c.quota.toLocaleString()}，超出 $${(bcU-c.quota).toLocaleString()}。`});
  const tips=[];
  if(c.hasDementia&&c.age>=50&&!(qtyMap['AA05']||0))tips.push('AA05 照顧困難加計');
  if(c.disabilityLevel>=4&&c.caregiverAge>75&&!(qtyMap['AA07']||0))tips.push('AA07 家庭照顧功能微弱加計');
  if(tips.length)msgs.push({t:'info',m:'💡 符合加計資格但尚未選用：<strong>'+tips.join('、')+'</strong>（政府全額補助，建議申請）'});
  box.style.display=msgs.length?'block':'none';
  box.innerHTML=msgs.map(m=>`<div class="alert alert-${m.t}"><span class="alert-icon">${m.t==='danger'?'🚫':m.t==='warning'?'⚠️':'💡'}</span><div>${m.m}</div></div>`).join('');
}

function recalc() {
  const c=getConditions();
  renderTables();
  checkAlerts(c);
  updateSummaryBar(c);
  updateBadges(c);
  buildPrintTable(c);
}

function onQtyChange(code,val) {
  let n=Math.max(0,parseInt(val)||0);
  const s=SERVICES.find(x=>x.code===code);
  if(s&&s.maxUnits>0&&n>s.maxUnits)n=s.maxUnits;
  qtyMap[code]=n;
  const inp=document.getElementById('qty-'+code);if(inp)inp.value=n;
  recalc();
}

function resetAll(){if(!confirm('確定要將所有服務次數歸零嗎？'))return;SERVICES.forEach(s=>{qtyMap[s.code]=0;});recalc();}

function autoFillQuota(){const lv=parseInt(document.getElementById('disabilityLevel').value),q=QUOTA_BY_LEVEL[lv]||0;document.getElementById('monthlyQuota').value=q;document.getElementById('quotaHint').textContent=`失能第 ${lv} 級建議額度：$${q.toLocaleString()}`;}

let editingCode = null; // null = 新增，有值 = 修改中

function openForm(code) {
  editingCode = code;
  const s = code ? SERVICES_DATA.find(x=>x.code===code) : null;
  document.getElementById('form-title').textContent = s ? `修改服務項目：${code}` : '新增服務項目';
  document.getElementById('f-code').value        = s ? s.code : '';
  document.getElementById('f-cat').value         = s ? s.cat : 'BA';
  document.getElementById('f-name').value        = s ? s.name : '';
  document.getElementById('f-price').value       = s ? s.price : '';
  document.getElementById('f-maxUnits').value    = s ? (s.maxUnits||'') : '';
  document.getElementById('f-special').value     = s ? (s.special||'') : '';
  document.getElementById('f-govFull').value     = s&&s.govFull ? '1' : '0';
  document.getElementById('f-respite').value     = s&&s.useRespiteQuota ? '1' : '0';
  document.getElementById('f-eligible').value    = s ? (s.eligibleType||'') : '';
  document.getElementById('f-conflicts').value   = s&&s.conflicts?.length ? s.conflicts.join(',') : '';
  document.getElementById('f-conflictNote').value= s ? (s.conflictNote||'') : '';
  document.getElementById('f-note').value        = s ? (s.note||'') : '';
  document.getElementById('form-overlay').classList.add('show');
}

function closeForm(){document.getElementById('form-overlay').classList.remove('show');}
function closeFormIfBg(e){if(e.target===document.getElementById('form-overlay'))closeForm();}

function saveForm() {
  const code  = document.getElementById('f-code').value.trim();
  const name  = document.getElementById('f-name').value.trim();
  const price = parseInt(document.getElementById('f-price').value)||0;
  const cat   = document.getElementById('f-cat').value;

  // 基本驗證
  if (!code) { alert('請填入服務代碼'); return; }
  if (!name) { alert('請填入服務名稱'); return; }
  if (price<=0) { alert('請填入正確單價'); return; }

  // 若代碼已存在且不是正在修改的那筆 → 詢問是否覆蓋
  const existIdx = SERVICES_DATA.findIndex(s=>s.code===code);
  if (existIdx>=0 && code!==editingCode) {
    if (!confirm(`代碼 "${code}" 已存在，確定要覆蓋嗎？`)) return;
  }

  const conflictsRaw = document.getElementById('f-conflicts').value;
  const newRecord = {
    code,
    name,
    cat,
    price,
    govFull:         document.getElementById('f-govFull').value==='1',
    special:         document.getElementById('f-special').value,
    useRespiteQuota: document.getElementById('f-respite').value==='1',
    maxUnits:        parseInt(document.getElementById('f-maxUnits').value)||0,
    conflicts:       conflictsRaw ? conflictsRaw.split(',').map(x=>x.trim()).filter(Boolean) : [],
    conflictNote:    document.getElementById('f-conflictNote').value.trim(),
    eligibleType:    document.getElementById('f-eligible').value,
    note:            document.getElementById('f-note').value.trim(),
  };

  // 若修改舊代碼且新代碼不同，先移除舊的
  if (editingCode && editingCode!==code) {
    const oldIdx=SERVICES_DATA.findIndex(s=>s.code===editingCode);
    if(oldIdx>=0) SERVICES_DATA.splice(oldIdx,1);
    delete qtyMap[editingCode];
  }

  // 插入或更新
  const idx=SERVICES_DATA.findIndex(s=>s.code===code);
  if(idx>=0) SERVICES_DATA[idx]=newRecord;
  else SERVICES_DATA.push(newRecord);

  saveServicesData();
  SERVICES = buildServices(SERVICES_DATA);

  closeForm();
  buildCatTabs();
  renderMgrTable();
  // 重新渲染計算器
  renderServiceCards();
  recalc();
}

// ===================================================
// 刪除
// ===================================================
function deleteService(code) {
  const s=SERVICES_DATA.find(x=>x.code===code);
  if (!s) return;
  if (!confirm(`確定要刪除「${s.name}（${code}）」嗎？\n若該項目有填入次數，將一併清除。`)) return;
  SERVICES_DATA=SERVICES_DATA.filter(x=>x.code!==code);
  delete qtyMap[code];
  saveServicesData();
  SERVICES=buildServices(SERVICES_DATA);
  buildCatTabs();
  renderMgrTable();
  renderServiceCards();
  recalc();
}

// ===================================================
// 還原預設
// ===================================================
function resetToDefault() {
  if (!confirm('確定要還原全部預設服務資料嗎？\n您自行新增／修改的內容將全部清除！')) return;
  SERVICES_DATA=DEFAULT_SERVICES_DATA.map(s=>({...s}));
  saveServicesData();
  SERVICES=buildServices(SERVICES_DATA);
  // 清除所有次數
  Object.keys(qtyMap).forEach(k=>delete qtyMap[k]);
  buildCatTabs();
  renderMgrTable();
  renderServiceCards();
  recalc();
  alert('已還原為系統預設服務資料。');
}

// 匯出 JSON
// ===================================================
function exportJSON() {
  const json=JSON.stringify(SERVICES_DATA,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const d=new Date(),ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.download=`長照服務資料_${ds}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===================================================
// 匯入 JSON
// ===================================================
function importJSON(event) {
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try {
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)||!data.length) throw new Error('格式錯誤');
      // 基本欄位驗證
      const ok=data.every(s=>s.code&&s.name&&typeof s.price==='number'&&s.cat);
      if(!ok) throw new Error('部分資料缺少必要欄位（code/name/price/cat）');
      if(!confirm(`確定匯入 ${data.length} 筆服務資料嗎？\n目前資料將被覆蓋！`)) return;
      SERVICES_DATA=data.map(s=>({...s,conflicts:s.conflicts||[]}));
      saveServicesData();
      SERVICES=buildServices(SERVICES_DATA);
      Object.keys(qtyMap).forEach(k=>delete qtyMap[k]);
      buildCatTabs();
      renderMgrTable();
      renderServiceCards();
      recalc();
      alert(`✅ 成功匯入 ${data.length} 筆服務資料！`);
    } catch(err) {
      alert('❌ 匯入失敗：'+err.message);
    }
    event.target.value='';
  };
  reader.readAsText(file,'utf-8');
}

// ===================================================
// 初始化
// ===================================================
renderServiceCards();
autoFillQuota();
recalc();
</script>
